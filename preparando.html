<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vereda - Preparando</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#ffffff",
              "on-primary-container": "#9bbdb0",
              "on-tertiary-container": "#dbaaa3",
              "primary-container": "#2e4d43",
              "inverse-surface": "#303030",
              "on-primary-fixed": "#002018",
              "surface-variant": "#e4e2e1",
              "on-secondary-container": "#762c12",
              "inverse-primary": "#accec1",
              "surface-container-highest": "#e4e2e1",
              "on-surface-variant": "#414845",
              surface: "#fcf9f8",
              "tertiary-fixed": "#ffdad5",
              "primary-fixed": "#c7eadc",
              error: "#ba1a1a",
              "surface-bright": "#fcf9f8",
              primary: "#17362d",
              "outline-variant": "#c1c8c4",
              "on-tertiary-fixed": "#2f1310",
              "on-surface": "#1b1c1c",
              "tertiary-container": "#623e39",
              "surface-dim": "#dcd9d9",
              "surface-container-low": "#f6f3f2",
              secondary: "#99462a",
              "on-tertiary-fixed-variant": "#613d38",
              "on-secondary-fixed-variant": "#7a2f15",
              "on-primary-fixed-variant": "#2e4d43",
              "on-primary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-background": "#1b1c1c",
              "error-container": "#ffdad6",
              "inverse-on-surface": "#f3f0f0",
              "surface-container": "#f0eded",
              "on-tertiary": "#ffffff",
              tertiary: "#482824",
              "surface-container-high": "#eae7e7",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#edbbb3",
              "secondary-fixed-dim": "#ffb59e",
              outline: "#727975",
              "on-secondary-fixed": "#390b00",
              "primary-fixed-dim": "#accec1",
              "surface-tint": "#45655a",
              "secondary-fixed": "#ffdbd0",
              background: "#fcf9f8",
              "on-error": "#ffffff",
              "secondary-container": "#fe9572"
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem"
            },
            spacing: {
              "margin-focus": "64px",
              "container-max-width": "720px",
              unit: "8px",
              "sidebar-width": "280px",
              gutter: "24px"
            },
            fontFamily: {
              h1: ["Manrope"],
              "body-reading": ["Newsreader"],
              "label-caps": ["Manrope"],
              "helper-text": ["Manrope"],
              "body-ui": ["Manrope"],
              h2: ["Manrope"],
              "display-lg": ["Newsreader"]
            },
            fontSize: {
              h1: ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "700" }],
              "body-reading": ["20px", { lineHeight: "34px", fontWeight: "400" }],
              "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.08em", fontWeight: "700" }],
              "helper-text": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "body-ui": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              h2: ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "600" }]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24;
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter selection:bg-primary-fixed selection:text-on-primary-fixed">
    <main class="w-full max-w-[580px] flex flex-col items-center">
      <a class="mb-12 text-primary flex flex-col items-center hover:opacity-80 transition-opacity" href="/vereda/" aria-label="Voltar ao Vereda">
        <span class="material-symbols-outlined text-4xl mb-2" style="font-variation-settings: 'wght' 200;">history_edu</span>
      </a>

      <h1 class="font-h1 text-h1 text-primary text-center mb-16 max-w-[480px]">
        Vereda está se preparando para te acompanhar em qualquer lugar.
      </h1>

      <div class="w-full flex flex-col gap-10 mb-16">
        <div class="w-full h-[3px] bg-surface-variant rounded-full overflow-hidden">
          <div class="h-full bg-primary w-[65%] rounded-full"></div>
        </div>

        <div class="flex flex-col gap-5 px-8">
          <div class="flex items-center gap-4 text-primary">
            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            <span class="font-body-ui text-body-ui">Sincronizando Dicionários</span>
          </div>
          <div class="flex items-center gap-4 text-primary opacity-90">
            <span class="material-symbols-outlined text-xl">sync</span>
            <span class="font-body-ui text-body-ui">Baixando Templates</span>
          </div>
          <div class="flex items-center gap-4 text-outline">
            <span class="material-symbols-outlined text-xl">radio_button_unchecked</span>
            <span class="font-body-ui text-body-ui">Configurando Motor de Análise</span>
          </div>
        </div>
      </div>

      <div class="w-full bg-surface-container-low rounded-xl p-6 flex items-start gap-5 border border-surface-variant">
        <div class="text-secondary mt-1">
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'wght' 300;">cloud_off</span>
        </div>
        <div class="flex flex-col">
          <p class="font-body-reading text-body-reading text-on-surface">
            Pode levar seu notebook para o bunker: o Vereda agora funciona 100% offline.
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
